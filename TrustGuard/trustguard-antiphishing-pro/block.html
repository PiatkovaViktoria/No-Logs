<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrustGuard — Фишинговый сайт заблокирован</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e8e8e8;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: rgba(220, 53, 69, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 {
      font-size: 1.35rem;
      margin: 0 0 12px;
      color: #fff;
    }
    .message {
      color: #b0b0b0;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .reason {
      color: #f8a5a5;
      font-size: 0.9rem;
      margin-bottom: 20px;
      padding: 10px;
      background: rgba(220, 53, 69, 0.15);
      border-radius: 8px;
    }
    .blocked-url {
      word-break: break-all;
      font-size: 0.85rem;
      color: #c0c0c0;
      background: rgba(0,0,0,0.2);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      font-weight: 600;
    }
    .btn-back {
      background: #4a6fa5;
      color: #fff;
    }
    .btn-back:hover { background: #5a7fb5; }
    .btn-go {
      background: rgba(200, 80, 80, 0.9);
      color: #fff;
    }
    .btn-go:hover { background: rgba(220, 100, 100, 1); }
    .counter {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #8f8f8f;
    }
    .counter-num { color: #6cce6c; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Фишинговый сайт заблокирован</h1>
    <p class="message">TrustGuard предотвратил переход на опасный ресурс.</p>
    <p class="reason" id="reason">—</p>
    <p class="blocked-url" id="blocked-url">—</p>
    <div class="buttons">
      <button class="btn btn-back" id="btn-back">Назад</button>
      <button class="btn btn-go" id="btn-go">Всё равно перейти</button>
    </div>
    <p class="counter">Всего заблокировано: <span class="counter-num" id="total-count">0</span></p>
  </div>
  <script src="block.js"></script>
</body>
</html>
